name: Update GitHub metrics

on:
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        if: ${{ secrets.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: juanpiRiv
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          filename: github-metrics.svg

      - name: METRICS_TOKEN not configured
        if: ${{ secrets.METRICS_TOKEN == '' }}
        run: echo "METRICS_TOKEN is missing. Skipping metrics generation."
